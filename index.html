<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard App</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav>
    <select id="subjectSelect"></select>
    <div class="nav-menu-wrap">
        <button id="navMenuBtn" aria-label="Menu">&#8942;</button>
        <div id="navMenuPanel">
            <button id="newSubject">Add Subject</button>
            <button id="deleteSubject">Delete Subject</button>
            <div class="nav-menu-divider"></div>
            <button id="themeToggle">Dark Mode 🌙</button>
        </div>
    </div>
</nav>

<div class="page-tabs">
    <button class="tab active" data-target="add">Add Cards</button>
    <button class="tab" data-target="study">Study</button>
</div>

<!-- ---------- ADD CARDS SECTION ---------- -->
<section id="add" class="active">
    <div class="add-card-panel">
        <input id="question" placeholder="Question">
        <textarea id="answer" placeholder="Answer"></textarea>
        <div class="save-card-row">
            <button class="primary" id="saveCard">Save Card</button>
        </div>
    </div>

    <div class="card-actions">
        <button id="clearAll">Clear All</button>
    </div>

    <div class="card-search-wrap">
        <input type="search" id="cardSearch" placeholder="Search cards…">
    </div>

    <div class="card-list" id="cardList"></div>
</section>

<!-- ---------- STUDY MODE SECTION ---------- -->
<section id="study">
    <div class="study-counter" id="studyCounter"></div>
    <div class="flashcard-wrapper" id="studyCardWrapper">
        <div class="flashcard" id="studyCard">
            <div class="front"></div>
            <div class="back"></div>
        </div>
    </div>

    <div class="study-controls">
        <button class="primary" id="autoShuffleStudy" aria-label="Auto shuffle off" title="Auto shuffle off">🔁 Auto Shuffle</button>
    </div>
</section>

<script src="js/app.js" defer></script>
</body>
</html>
